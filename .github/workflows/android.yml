name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        # 暂时关闭缓存，防止旧版本的错误文件干扰
        # cache: gradle 

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        # 强制指定版本，不使用环境默认的 9.4.1
        gradle-version: 8.2

    - name: Build APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: RumorOfLight-debug
        path: app/build/outputs/apk/debug/app-debug.apk
